<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0d9488"/>
  <!-- House shape -->
  <g transform="translate(76, 64)">
    <!-- Roof -->
    <polygon points="180,20 340,160 20,160" fill="white" opacity="0.95"/>
    <!-- House body -->
    <rect x="52" y="156" width="256" height="210" rx="8" fill="white" opacity="0.95"/>
    <!-- Door -->
    <rect x="140" y="248" width="80" height="118" rx="8" fill="#0d9488"/>
    <!-- Windows -->
    <rect x="68" y="190" width="60" height="54" rx="6" fill="#ccfbf1"/>
    <rect x="232" y="190" width="60" height="54" rx="6" fill="#ccfbf1"/>
    <!-- Chimney -->
    <rect x="252" y="60" width="30" height="70" fill="white" opacity="0.8"/>
  </g>
</svg>